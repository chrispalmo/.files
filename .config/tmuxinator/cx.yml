name: context
root: <%= ENV.fetch('DEV_ROOT', File.expand_path('~/dev')) %>/context

windows:
  - dev:
      layout: tiled
      panes:
        # top-left
        - shell_command: cd app && yarn && yarn dev
        # top-right
        - shell_command: cd ../context-meta && v todo.md
        # bottom-left
        - shell_command: l
        # bottom-right
        - shell_command: cd ../context-meta

